name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: archiflow_test
          POSTGRES_USER: archiflow
          POSTGRES_PASSWORD: archiflow123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore ArchiFlow.sln

      - name: Build (Release)
        run: dotnet build ArchiFlow.sln --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test ArchiFlow.sln
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
        env:
          ConnectionStrings__DefaultConnection: >
            Host=localhost;Port=5432;Database=archiflow_test;
            Username=archiflow;Password=archiflow123

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage
          retention-days: 7
